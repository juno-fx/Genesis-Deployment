{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: genesis-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
{{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: "{{ $value }}"
{{- end }}
spec:
  {{- $className := .Values.ingress.className | default .Values.ingressClassName }}
  {{- if $className }}
  ingressClassName: {{ $className }}
  {{- end }}
  rules:
    - http:
        paths:
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: genesis
                port:
                  number: 3000
      {{- if .Values.host }}
      host: {{ .Values.host }}
      {{- end }}
{{- end }}