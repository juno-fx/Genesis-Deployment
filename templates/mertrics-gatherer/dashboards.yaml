{{- range $path, $content := .Files.Glob "files/dashboards/*" }}
{{- $name := base $path | trimSuffix (ext $path) | lower | replace "_" "-" | replace "." "-" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-dashboard
  namespace: {{ $.Values.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  {{ base $path }}: |
    {{ $content | toString | nindent 4 | trim }}
{{- end }}


